name: Docker Compose lint

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main
    paths:
      - '**/compose.yaml'
      - '**/*.compose.yaml'
  push:
    branches:
      - main
    paths:
      - '**/compose.yaml'
      - '**/*.compose.yaml'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker-compose-linter/dclint-github-action@v1.6.0
        with:
          recursive: true
          exclude: .github
          # Rules being ignored for this repository, 
          # we have specific needs
          disable-rule: >-
            no-unbound-port-interfaces
            require-project-name-field
            services-alphabetical-order
        # continue-on-error: true
