# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "github-actions" # See documentation for possible values
    directory: "/" # Location of package manifests
    schedule:
      interval: "weekly"
  - package-ecosystem: "docker-compose" # Komodo
    directories:
      - "/machines/control-server/komodo-control" # Machine: control-server
      - "/machines/docker-host/komodo-periphery" # Machine: docker-host 
    groups:
      komodo:
        patterns:
          - "ghcr.io/moghtech/komodo-core"
          - "ghcr.io/moghtech/komodo-periphery"
          - "ghcr.io/nikhil-gohil/komodo-periphery-sops"
          - "mongo:8"
    schedule:
      interval: "weekly"
  - package-ecosystem: "docker-compose"
    directories:
      - "/machines/control-server/reverse-proxy" # Machine: control-server
    groups:
      reverse-proxy:
        patterns:
          - "ghcr.io/anarchobooleanism/certbot-dns-namecheap"
          - "ghcr.io/anarchobooleanism/saphnet-nginx"
    schedule:
      interval: "weekly"
