# Much of this comes from https://dev.to/marrouchi/the-challenge-about-ssl-in-docker-containers-no-one-talks-about-32gh

x-common:
  TIMEZONE: &timezone "${TZ}"

services:
  nginx:
    image: ghcr.io/anarchobooleanism/saphnet-nginx:v0.4.0@sha256:460810b4ab2d226a4b7c3bc29e63ac3484228b6af0e7494a8aad1edf21bb8ba3
    ports:
      - "80:80"
      - "443:443"
    environment:
      TZ: *timezone
    volumes:
      # Main conf file
      - ${NGINX_PROXIES_FILE}:/etc/nginx/proxies.conf:ro
      # Certificate files
      - certbot-conf:/etc/letsencrypt:ro
    networks: # For connecting with other services directly
      - central-network
    restart: unless-stopped
  
  certbot:
    image: ghcr.io/anarchobooleanism/certbot-dns-namecheap:latest@sha256:a4162fa9ea6ea271c6a2b0f6cc563bccfb7df2256abb90ad4dca0946e9f81c28
    entrypoint: |
      /bin/sh -c 'trap exit TERM; while :; do certbot renew -vv; sleep 12h & wait $${!}; done;'
    environment:
      TZ: *timezone
    volumes:
      - certbot-conf:/etc/letsencrypt
      - ${NAMECHEAP_API_DETAILS_FILE}:/namecheap.ini
    # Renew certificates every 12 hours
    restart: unless-stopped

volumes:
  certbot-conf:
    name: certbot-conf
    external: true

networks:
  central-network:
    name: central-network
    external: true
