# Much of this comes from https://dev.to/marrouchi/the-challenge-about-ssl-in-docker-containers-no-one-talks-about-32gh

x-common:
  TIMEZONE: &timezone "${TZ}"

services:
  nginx:
    image: ghcr.io/anarchobooleanism/saphnet-nginx:v0.2.2@sha256:d798cf6b61bdf08ac80d2ec1239cd369c648053b54967f358adf4bd6854e5d10
    ports:
      - "80:80"
      - "443:443"
    environment:
      TZ: *timezone
    volumes:
      # Main conf file
      - ${NGINX_PROXIES_FILE}:/etc/nginx/proxies.conf:ro
      # Certificate files
      - certbot-conf:/etc/letsencrypt:ro
    networks: # For connecting with other services directly
      - central-network
    restart: unless-stopped
  
  certbot:
    image: ghcr.io/anarchobooleanism/certbot-dns-namecheap:latest@sha256:6d0fd9525941709c9b083e5e0dd8f04c4c3f50c693191be5248d935b771c502c
    entrypoint: |
      /bin/sh -c 'trap exit TERM; while :; do certbot renew -vv; sleep 12h & wait $${!}; done;'
    environment:
      TZ: *timezone
    volumes:
      - certbot-conf:/etc/letsencrypt
      - ${NAMECHEAP_API_DETAILS_FILE}:/namecheap.ini
    # Renew certificates every 12 hours
    restart: unless-stopped

volumes:
  certbot-conf:
    name: certbot-conf
    external: true

networks:
  central-network:
    name: central-network
    external: true
